<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soukoun Premium | سكينة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=600;700;800&family=Tajawal:wght=500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #000000; 
            --bg-gradient: linear-gradient(180deg, #070708 0%, #000000 100%);
            --card-bg: #0b0c10; 
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent: #10b981; 
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* MAIN WRAPPER */
        .phone-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px 220px 16px;
            position: relative;
            min-height: 100vh;
        }

        .app-page {
            display: none;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            transform: translate3d(0, 8px, 0); 
            will-change: opacity, transform;
            transition: opacity 0.25s ease-out, transform 0.25s ease-out;
        }

        .app-page.active-page {
            display: flex;
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        /* HEADER & NAVIGATION */
        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .nav-title-block {
            display: flex;
            flex-direction: column;
        }

        .nav-title {
            font-size: 26px;
            font-weight: 900;
        }

        .nav-title span {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-primary);
        }

        .nav-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .btn-circle-back {
            width: 44px;
            height: 44px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 15px;
            cursor: pointer;
        }

        /* SEARCH BAR */
        .search-block {
            position: relative;
            width: 100%;
        }

        .search-block i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 15px;
        }

        .input-search {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 50px 16px 16px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-search:focus {
            border-color: var(--accent);
        }

        /* RECITERS GRID */
        .reciters-layout-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .reciter-item-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 20px 12px;
            border-radius: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .reciter-item-node:hover {
            transform: translate3d(0, -3px, 0);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .avatar-mask-frame {
            width: 74px;
            height: 74px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--accent);
            transition: all 0.2s;
        }

        .reciter-item-node:hover .avatar-mask-frame {
            background: var(--accent);
            color: #000000;
        }

        .lbl-reciter-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .lbl-reciter-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* RADIO & LIVE STREAM CUSTOM STYLE */
        .radio-live-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(11, 12, 16, 0.5) 100%);
            border: 1px dashed rgba(16, 185, 129, 0.4) !important;
            grid-column: span 2;
            flex-direction: row !important;
            justify-content: space-between;
            text-align: right !important;
            padding: 16px 20px !important;
            align-items: center !important;
        }
        .radio-live-box .avatar-mask-frame {
            margin-bottom: 0 !important;
            width: 50px;
            height: 50px;
            font-size: 18px;
            background: var(--accent);
            color: #000000;
        }
        .radio-text-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-right: 14px;
        }

        /* SURAH ROWS */
        .surah-rows-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row-surah-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 16px 18px;
            border-radius: 16px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .row-surah-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .row-surah-item.active-playing {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.04);
        }

        .surah-meta-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .txt-surah-idx {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            width: 26px;
            height: 26px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-surah-item.active-playing .txt-surah-idx {
            background: var(--accent);
            color: #000000;
        }

        .txt-surah-title-ar {
            font-size: 15px;
            font-weight: 700;
        }

        .txt-surah-title-en {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* LIVE EQUALIZER */
        .eq-animation-container {
            display: none;
            align-items: flex-end;
            gap: 2px;
            width: 14px;
            height: 12px;
            margin-right: 8px;
        }

        .row-surah-item.active-playing .eq-animation-container {
            display: flex;
        }

        .eq-bar {
            width: 3px;
            height: 100%;
            background-color: var(--accent);
            border-radius: 1px;
            animation: bounceEQ 0.6s ease-in-out infinite alternate;
        }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; }
        .eq-bar:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounceEQ {
            0% { transform: scaleY(0.2); }
            100% { transform: scaleY(1); }
        }

        /* BOTTOM HUB */
        .bottom-dock-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate3d(-50%, 0, 0);
            width: 100%;
            max-width: 480px;
            background: #000000;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 100;
            padding: 0 16px calc(10px + env(safe-area-inset-bottom)) 16px;
        }

        .floating-deck-player {
            background: #0d0e12; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            position: relative;
            margin-top: -20px;
            margin-bottom: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .deck-micro-timeline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
        }

        .deck-timeline-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s linear;
        }

        .deck-left-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .deck-avatar-replacement {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: var(--accent);
        }

        .deck-text-meta {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .txt-deck-track-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .txt-deck-artist-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .deck-action-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-deck-action {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .btn-deck-action.play-btn-style {
            background: var(--text-primary);
            color: #000000;
            font-size: 14px;
        }
        
        .btn-deck-action.loop-active {
            color: var(--accent);
            background: rgba(16, 185, 129, 0.1);
        }

        /* TABS NAVBAR */
        .app-tabs-navbar {
            display: flex;
            justify-content: space-around;
            padding-top: 4px;
        }

        .tab-item-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
        }

        .tab-item-button i { font-size: 18px; }
        .tab-item-button.tab-active { color: var(--accent); }

        .tab-item-button.tab-active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            width: 10px;
            height: 3px;
            background: var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        
        <div id="pageReciters" class="app-page active-page">
            <div class="nav-header">
                <div class="nav-title-block">
                    <h1 class="nav-title"><span>Soukoun</span></h1>
                    <div class="nav-subtitle">منصة التلاوات الخاشعة الممتازة</div>
                </div>
            </div>

            <div class="search-block">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="input-search" id="searchBarField" placeholder="ابحث عن قارئ أو إذاعة..." oninput="runSearchFilter()">
            </div>

            <div class="reciters-layout-grid" id="recitersDisplayGrid"></div>
        </div>

        <div id="pageSurahs" class="app-page">
            <div class="nav-header">
                <button class="btn-circle-back" onclick="navigateToPage('pageReciters')"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="nav-title-block" style="text-align: left; align-items: flex-start; width: 100%; margin-right: 12px;">

                </div>

            <div class="surah-rows-container" id="surahRowsTarget"></div>
        </div>

    </div>

    <div class="bottom-dock-container">

            <div class="deck-action-controls">

                <button class="btn-deck-action play-btn-style" onclick="handlePlayPauseClick()"><i class="fa-solid fa-play" id="deckPlayIcon"></i></button>
                <button class="btn-deck-action" id="btnNextTrack" onclick="triggerNextTrack()"><i class="fa-solid fa-backward"></i></button>
            </div>
        </div>

        <div class="app-tabs-navbar">

            <button class="tab-item-button" onclick="filterByCat('famous', this)"><i class="fa-solid fa-star"></i><span>المشاهير</span></button>
        </div>
    </div>

"048","en":"Al-Fath","ar":"الفتح"},{"id":"049","en":"Al-Hujurat","ar":"الحجرات"},{"id":"050","en":"Qaf","ar":"ق"},{"id":"051","en":"Adh-Dhariyat","ar":"الذاريات"},{"id":"052","en":"At-Tur","ar":"الطور"},{"id":"053","en":"An-Najm","ar":"النجم"},{"id":"054","en":"Al-Qamar","ar":"القمر"},{"id":"055","en":"Ar-Rahman","ar":"الرحمن"},{"id":"056","en":"Al-Waqi'ah","ar":"الواقعة"},{"id":"057","en":"Al-Hadid","ar":"الحديد"},{"id":"058","en":"Al-Mujadilah","ar":"المجادلة"},{"id":"059","en":"Al-Hashr","ar":"الحشر"},{"id":"060","en":"Al-Mumtahanah","ar":"الممتحنة"},{"id":"061","en":"As-Saff","ar":"الصف"},{"id":"062","en":"Al-Jumu'ah","ar":"الجمعة"},{"id":"063","en":"Al-Munafiqun","ar":"المنافقون"},{"id":"064","en":"At-Taghabun","ar":"التغابن"},{"id":"065","en":"At-Talaq","ar":"الطلاق"},{"id":"066","en":"At-Tahrim","ar":"التحريم"},{"id":"067","en":"Al-Mulk","ar":"الملك"},{"id":"068","en":"Al-Qalam","ar":"القلم"},{"id":"069","en":"Al-Haqqah","ar":"الحاقة"},{"id":"070","en":"Al-Ma'arij","ar":"المعارج"},{"id":"071","en":"Nuh","ar":"نوح"},{"id":"072","en":"Al-Jinn","ar":"الجن"},{"id":"073","en":"Al-Muzzammil","ar":"المزمل"},{"id":"074","en":"Al-Muddaththir","ar":"المدثر"},{"id":"075","en":"Al-Qiyamah","ar":"القيامة"},{"id":"076","en":"Al-Insan","ar":"الإنسان"},{"id":"077","en":"Al-Mursalat","ar":"المرسلات"},{"id":"078","en":"An-Naba'","ar":"النبأ"},{"id":"079","en":"An-Nazi'at","ar":"النازعات"},{"id":"080","en":"'Abasa","ar":"عبس"},{"id":"081","en":"At-Takwir","ar":"التكوير"},{"id":"082","en":"Al-Infitar","ar":"الانفطار"},{"id":"083","en":"Al-Mutaffifin","ar":"المطففين"},{"id":"084","en":"Al-Inshiqaq","ar":"الانشقاق"},{"id":"085","en":"Al-Buruj","ar":"البروج"},{"id":"086","en":"At-Tariq","ar":"الطارق"},{"id":"087","en":"Al-A'la","ar":"الأعلى"},{"id":"088","en":"Al-Ghashiyah","ar":"الغاشية"},{"id":"089","en":"Al-Fajr","ar":"الفجر"},{"id":"090","en":"Al-Balad","ar":"البلد"},{"id":"091","en":"Ash-Shams","ar":"الشمس"},{"id":"092","en":"Al-Layl","ar":"الليل"},{"id":"093","en":"Ad-Duha","ar":"الضحى"},{"id":"094","en":"Ash-Sharh","ar":"الشرح"},{"id":"095","en":"At-Tin","ar":"التين"},{"id":"096","en":"Al-'Alaq","ar":"العلق"},{"id":"097","en":"Al-Qadr","ar":"القدر"},{"id":"098","en":"Al-Bayyinah","ar":"البينة"},{"id":"099","en":"Az-Zalzalah","ar":"الزلزلة"},{"id":"100","en":"Al-'Adiyat","ar":"العاديات"},{"id":"101","en":"Al-Qari'ah","ar":"القارعة"},{"id":"102","en":"At-Takathur","ar":"التكاثر"},{"id":"103","en":"Al-'Asr","ar":"العصر"},{"id":"104","en":"Al-Humazah","ar":"الهمزة"},{"id":"105","en":"Al-Fil","ar":"الفيل"},{"id":"106","en":"Quraysh","ar":"قريش"},{"id":"107","en":"Al-Ma'un","ar":"الماعون"},{"id":"108","en":"Al-Kawthar","ar":"الكوثر"},{"id":"109","en":"Al-Kafirun","ar":"الكافرون"},{"id":"110","en":"An-Nasr","ar":"النصر"},{"id":"111","en":"Al-Masad","ar":"المسد"},{"id":"112","en":"Al-Ikhlas","ar":"الإخلاص"},{"id":"113","en":"Al-Falaq","ar":"الفلق"},{"id":"114","en":"An-Nas","ar":"الناس"}
        ];

        let activeReciterObject = recitersDataset[0]; 
        let selectedSurahIndex = 0; 
        let currentFilterCategory = "all";
        let isLoopActive = false;

        const mediaEngine = document.getElementById('audioPlaybackCore');
        const deckPlayIcon = document.getElementById('deckPlayIcon');
        const trackProgressLine = document.getElementById('trackProgressLine');
        const btnTrackLoop = document.getElementById('btnTrackLoop');
        const btnNextTrack = document.getElementById('btnNextTrack');
        const deckTimelineWrapper = document.getElementById('deckTimelineWrapper');

        window.onload = function() {
            renderRecitersGrid(recitersDataset);
            buildSurahPlaylistRows();
            
            btnTrackLoop.style.display = "none";
            btnNextTrack.style.display = "none";
            deckTimelineWrapper.style.visibility = "hidden";
        };

        mediaEngine.onerror = function() {
            console.log("Audio stream connection refreshed.");
        };

        function navigateToPage(pageId) {
            const pages = document.querySelectorAll('.app-page');
            pages.forEach(p => p.classList.remove('active-page'));
            
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active-page');
            window.scrollTo(0,0);
        }

        function renderRecitersGrid(datasetList) {
            const gridTarget = document.getElementById('recitersDisplayGrid');
            if (!gridTarget) return;
            gridTarget.innerHTML = "";
            
            datasetList.forEach(reciter => {
                const cardNode = document.createElement('div');
                if (reciter.isRadio) {
                    cardNode.className = 'reciter-item-node radio-live-box';
                    cardNode.onclick = () => playRadioDirectly(reciter.id);
                    cardNode.innerHTML = `
                        <div class="radio-text-group">
                            <div class="lbl-reciter-name" style="color: var(--accent); font-size:15px;">${reciter.name}</div>
                            <div class="lbl-reciter-desc">${reciter.desc}</div>
                        </div>
                        <div class="avatar-mask-frame"><i class="${reciter.icon}"></i></div>
                    `;
                } else {
                    cardNode.className = 'reciter-item-node';
                    cardNode.onclick = () => selectReciterAndOpenSurahs(reciter.id);
                    cardNode.innerHTML = `
                        <div class="avatar-mask-frame"><i class="${reciter.icon}"></i></div>
                        <div class="lbl-reciter-name">${reciter.name}</div>
                        <div class="lbl-reciter-desc">${reciter.desc}</div>
                    `;
                }
                gridTarget.appendChild(cardNode);
            });
        }

        function runSearchFilter() {
            const rawInput = document.getElementById('searchBarField').value.trim().toLowerCase();
            let scopeDataset = recitersDataset;
            
            if (currentFilterCategory !== "all") {
                scopeDataset = recitersDataset.filter(r => r.cat === currentFilterCategory);
            }
            
            const filtered = scopeDataset.filter(r => r.name.toLowerCase().includes(rawInput));
            renderRecitersGrid(filtered);
        }

        function filterByCat(categoryKey, btnDOM) {
            currentFilterCategory = categoryKey;
            document.querySelectorAll('.tab-item-button').forEach(b => b.classList.remove('tab-active'));
            btnDOM.classList.add('tab-active');
            
            document.getElementById('searchBarField').value = "";
            navigateToPage('pageReciters');

            if(categoryKey === "all") {
                renderRecitersGrid(recitersDataset);
            } else {
                const dynamicList = recitersDataset.filter(r => r.cat === categoryKey);
                renderRecitersGrid(dynamicList);
            }
        }

        function selectReciterAndOpenSurahs(reciterId) {
            activeReciterObject = recitersDataset.find(r => r.id === reciterId);
            document.getElementById('surahPageTitle').innerText = activeReciterObject.name;
            
            buildSurahPlaylistRows();
            navigateToPage('pageSurahs');
        }

        function openCurrentReciterSurahs() {
            if (activeReciterObject.isRadio) return; 
            document.getElementById('surahPageTitle').innerText = activeReciterObject.name;
            buildSurahPlaylistRows();
            navigateToPage('pageSurahs');
        }

        function playRadioDirectly(radioId) {
            activeReciterObject = recitersDataset.find(r => r.id === radioId);
            
            mediaEngine.pause();
            mediaEngine.src = activeReciterObject.server; 
            mediaEngine.loop = false;
            
            btnTrackLoop.style.display = "none";
            btnNextTrack.style.display = "none";
            deckTimelineWrapper.style.visibility = "hidden";
            trackProgressLine.style.width = "0%";
            
            document.getElementById('deckAvatarIcon').innerHTML = `<i class="${activeReciterObject.icon}"></i>`;
            document.getElementById('deckSurahTitle').innerText = "البث المباشر الحي";
            document.getElementById('deckReciterName').innerText = activeReciterObject.name;
            
            mediaEngine.play()
            .then(() => {
                deckPlayIcon.className = "fa-solid fa-pause";
            })
            .catch((err) => {
                console.log("Audio play gesture verified.");
                deckPlayIcon.className = "fa-solid fa-play";
            });
            
            document.querySelectorAll('.row-surah-item').forEach(r => r.classList.remove('active-playing'));
        }

        function buildSurahPlaylistRows() {
            const targetContainer = document.getElementById('surahRowsTarget');
            if (!targetContainer) return;
            targetContainer.innerHTML = "";

            surahIndexMap.forEach((surah, idx) => {
                const rowItem = document.createElement('div');
                rowItem.className = `row-surah-item ${(!activeReciterObject.isRadio && selectedSurahIndex === idx) ? 'active-playing' : ''}`;
                rowItem.onclick = () => bindAudioSourceStream(idx, true);
                
                rowItem.innerHTML = `
                    <div class="surah-meta-right">
                        <div class="txt-surah-idx">${parseInt(surah.id)}</div>
                        <div class="txt-surah-title-ar">${surah.ar}</div>
                        <div class="eq-animation-container">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </div>
                    <div class="txt-surah-title-en">${surah.en}</div>
                `;
                targetContainer.appendChild(rowItem);
            });
        }

        function bindAudioSourceStream(surahIdx, autoPlayIntent) {
            btnTrackLoop.style.display = "flex";
            btnNextTrack.style.display = "flex";
            deckTimelineWrapper.style.visibility = "visible";

            selectedSurahIndex = surahIdx;
            const chosenSurah = surahIndexMap[surahIdx];
            
            if (activeReciterObject.isRadio) {
                activeReciterObject = recitersDataset.find(r => r.id === 0); 
            }

            mediaEngine.src = `${activeReciterObject.server}${chosenSurah.id}.mp3`;
            mediaEngine.loop = isLoopActive;
            
            document.getElementById('deckAvatarIcon').innerHTML = `<i class="${activeReciterObject.icon}"></i>`;
            document.getElementById('deckSurahTitle').innerText = `${parseInt(chosenSurah.id)}. ${chosenSurah.ar} (${chosenSurah.en})`;
            document.getElementById('deckReciterName').innerText = activeReciterObject.name;
            
            if (autoPlayIntent) {
                mediaEngine.play().catch((err) => console.log('Playback error:', err));
                deckPlayIcon.className = "fa-solid fa-pause";
            } else {
                deckPlayIcon.className = "fa-solid fa-play";
            }
            
            document.querySelectorAll('.row-surah-item').forEach((r, idx) => {
                if(idx === surahIdx) r.classList.add('active-playing');
                else r.classList.remove('active-playing');
            });
        }

        function handlePlayPauseClick() {
            if(!mediaEngine.src) {
                playRadioDirectly(99);
                return;
            }
            if(mediaEngine.paused) {
                mediaEngine.play().catch(e => console.log(e));
                deckPlayIcon.className = "fa-solid fa-pause";
            } else {
                mediaEngine.pause();
                deckPlayIcon.className = "fa-solid fa-play";
            }
        }

        function triggerNextTrack() {
            if (activeReciterObject.isRadio) return;
            let nextSequence = (selectedSurahIndex + 1) % surahIndexMap.length;
            bindAudioSourceStream(nextSequence, true);
        }

        function toggleAudioLoop() {
            if (activeReciterObject.isRadio) return;
            isLoopActive = !isLoopActive;
            mediaEngine.loop = isLoopActive;
            
            if (isLoopActive) {
                btnTrackLoop.classList.add('loop-active');
            } else {
                btnTrackLoop.classList.remove('loop-active');
            }
        }

        mediaEngine.addEventListener('timeupdate', () => {
            if(!activeReciterObject.isRadio && mediaEngine.duration) {
                const fillRatio = (mediaEngine.currentTime / mediaEngine.duration) * 100;
                trackProgressLine.style.width = `${fillRatio}%`;
            }
        });

        mediaEngine.addEventListener('ended', () => {
            if (!isLoopActive && !activeReciterObject.isRadio) {
                triggerNextTrack();
            }
        });
    </script>
</body>
</html>
